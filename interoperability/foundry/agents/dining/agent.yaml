# Dining Agent - Hosted Agent Definition (LangGraph)
# Deployed to Azure AI Foundry as a hosted agent

name: dining-agent
description: Restaurant and dining search agent using LangGraph
type: hosted
framework: langgraph

# Container configuration (used by deploy.py)
container:
  image: ${DINING_AGENT_IMAGE}
  cpu: "1"
  memory: "2Gi"

protocol:
  - protocol: responses
    version: v1

# Environment variables (used by deploy.py for hosted agent deployment)
environment:
  AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT}
  AZURE_OPENAI_DEPLOYMENT_NAME: ${AZURE_OPENAI_DEPLOYMENT_NAME}
  AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-2025-03-01-preview}
  BING_PROJECT_CONNECTION_ID: ${BING_PROJECT_CONNECTION_ID}
